                <h2>Send Us a message</h2>
                <form action="/submit">

                        <legend>Personal credentials</legend>

                        <label for="name">Name</label>
                        <input type="text" name="name" id="name">

                            <option value="collaborate">collaborate</option>
                            <option value="others">others</option>
                        </select>

                        <textarea name="message" id="message" placeholder="write your message here" cols="30" rows="10"></textarea>

                    </fieldset>
                    <fieldset>
                        <legend>Feedback preference</legend>

                        <label for="check"> 
                            <input type="checkbox" id="check">
                            Use your email to subscribe to my news file
                        </label>

                        <label for="tel">

                        <label for="mail">
